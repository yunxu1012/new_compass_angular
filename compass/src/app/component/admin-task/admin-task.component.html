
<div class="box">
    <app-admin-menu></app-admin-menu>
    <div class="listBox">
        <label class="nameTitle">Date</label>
        <label class="nameTitle">Time</label>
        <label class="nameTitle">Status</label>
        <label class="detailTitle">Details</label>
        @if(noTasks()){
        <p>No appointments to display.</p>
        }
        @for (task of pagedTasksToDisplay(); track task) {
        <p>
            <label class="nameText">{{task.taskDate}}</label>
            <label class="nameText">{{task.startTime}}</label>
            <label class="nameText">{{task.status}}</label>
            <label class="detailText"> <a [routerLink]="['/admin-task-details', task.id]">Details</a>
            </label>
        </p>
        }

    </div>
    <div> <button type="submit" class="buttonCenter" (click)="loadTasks()">Refresh Appointments</button></div>
    <div class="footer">
        <button (click)="goToPage(this.currentPage - 1)"
            [disabled]="currentPage === 1">Previous</button>
        <button *ngFor="let page of getPages()" (click)="goToPage(page)"
            [class.active]="currentPage === page">{{page}}</button>
        <button (click)="goToPage(currentPage + 1)"
            [disabled]="currentPage === totalPages">Next</button>
    </div>
</div>
